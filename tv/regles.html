<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>À La Folie — Règles de la maison</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #04040a; font-family: 'Outfit', sans-serif; color: #fff; cursor: none; }

    /* ── FOND ── */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); animation: floatOrb linear infinite; }
    .orb1 { width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(155,93,229,0.12), transparent 70%); top:-15%;left:-15%; animation-duration:32s; }
    .orb2 { width: 42vw; height: 42vw; background: radial-gradient(circle, rgba(77,212,212,0.09), transparent 70%); bottom:-10%;right:-10%; animation-duration:40s; animation-delay:-14s; }
    .orb3 { width: 30vw; height: 30vw; background: radial-gradient(circle, rgba(255,77,106,0.08), transparent 70%); top:40%;left:40%; animation-duration:26s; animation-delay:-7s; }
    @keyframes floatOrb { 0%{transform:translate(0,0)scale(1)}33%{transform:translate(3vw,-2vh)scale(1.04)}66%{transform:translate(-2vw,4vh)scale(0.97)}100%{transform:translate(0,0)scale(1)} }
    .grain { position:fixed;inset:0;z-index:0;opacity:0.02;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

    /* ── PAGE ── */
    .page { position:relative;z-index:1;width:100vw;height:100vh;display:grid;grid-template-rows:auto 1fr auto;padding:2.5vh 4.5vw;animation:pageIn .65s ease both; }
    @keyframes pageIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ── HEADER ── */
    .header { display:flex;align-items:center;justify-content:space-between;padding-bottom:1.8vh;border-bottom:1px solid rgba(255,255,255,0.055);margin-bottom:2vh; }
    .header-left { display:flex;align-items:center;gap:1.8vw; }
    .back-btn { display:flex;align-items:center;gap:0.6vw;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:.7vw;padding:.75vh 1.2vw;font-size:.82vw;font-weight:500;color:rgba(255,255,255,0.55);text-decoration:none;transition:all .2s;cursor:default; }
    .back-btn:hover,.back-btn:focus { background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.16);color:rgba(255,255,255,0.82);outline:none; }
    .back-btn svg { width:.85vw;height:.85vw; }
    .header-sep { width:1px;height:2vw;background:rgba(255,255,255,0.07); }
    .logo { display:flex;align-items:center;gap:3px;font-weight:800;font-size:2vw;letter-spacing:.06em;line-height:1; }
    .na1{color:#ff4d6a;text-shadow:0 0 14px #ff4d6a} .nl1{color:#ff8c42;text-shadow:0 0 14px #ff8c42} .na2{color:#ffd93d;text-shadow:0 0 14px #ffd93d} .nf{color:#6bcb77;text-shadow:0 0 14px #6bcb77} .nl2{color:#4dd4d4;text-shadow:0 0 14px #4dd4d4} .ni{color:#9b5de5;text-shadow:0 0 14px #9b5de5} .ne{color:#ff4dc4;text-shadow:0 0 14px #ff4dc4}
    .flower-svg { width:2vw;height:2vw;filter:drop-shadow(0 0 7px rgba(255,255,255,.8));animation:spinFlower 20s linear infinite; }
    @keyframes spinFlower { to{transform:rotate(360deg)} }
    .header-title { font-size:.75vw;font-weight:300;color:rgba(255,255,255,.22);letter-spacing:.3em;text-transform:uppercase; }

    /* ── SPLIT LAYOUT ── */
    .split { display:grid;grid-template-columns:20vw 1fr;gap:2vw;height:100%; }

    /* ── SIDEBAR ── */
    .sidebar { display:flex;flex-direction:column;gap:.5vh; }
    .sidebar-label { font-size:.58vw;font-weight:300;color:rgba(255,255,255,.18);letter-spacing:.28em;text-transform:uppercase;margin-bottom:.6vh;padding-left:.5vw; }

    .cat-btn {
      display:flex;align-items:center;gap:.9vw;
      padding:1vh 1vw;
      border-radius:.8vw;
      border:1px solid transparent;
      background:transparent;
      cursor:default;
      transition:background .2s,border-color .2s,transform .18s cubic-bezier(.34,1.56,.64,1);
      position:relative;overflow:hidden;
    }
    .cat-btn::before {
      content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;
      background:var(--c);border-radius:0 2px 2px 0;opacity:0;transition:opacity .2s;
    }
    .cat-btn:hover,.cat-btn:focus { background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);outline:none; }
    .cat-btn.active { background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1); }
    .cat-btn.active::before { opacity:1; }

    .cat-btn-icon {
      width:2.2vw;height:2.2vw;border-radius:25%;
      display:flex;align-items:center;justify-content:center;
      background:var(--ibg);flex-shrink:0;
      font-size:1.1vw;
      transition:transform .18s ease;
    }
    .cat-btn.active .cat-btn-icon { transform:scale(1.08); }
    .cat-btn-label { font-size:.8vw;font-weight:500;color:rgba(255,255,255,.5);transition:color .2s; }
    .cat-btn.active .cat-btn-label,
    .cat-btn:hover .cat-btn-label,
    .cat-btn:focus .cat-btn-label { color:rgba(255,255,255,.9); }
    .cat-btn-arrow { margin-left:auto;opacity:0;transition:opacity .15s,transform .15s;font-size:.6vw;color:rgba(255,255,255,.4); }
    .cat-btn.active .cat-btn-arrow { opacity:1;transform:translateX(2px); }

    /* ── CONTENT PANEL ── */
    .content-panel {
      background:rgba(255,255,255,.038);
      border:1px solid rgba(255,255,255,.07);
      border-radius:1.4vw;
      padding:2.5vh 2.2vw;
      position:relative;overflow:hidden;
      display:flex;flex-direction:column;gap:0;
    }
    .content-panel::before {
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--panel-accent,rgba(255,255,255,.08));
    }

    /* ── CONTENT HEADER ── */
    .content-head {
      display:flex;align-items:center;gap:1vw;
      padding-bottom:1.8vh;
      border-bottom:1px solid rgba(255,255,255,.06);
      margin-bottom:2vh;
      flex-shrink:0;
    }
    .content-head-emoji { font-size:2vw;line-height:1; }
    .content-title { font-size:1.4vw;font-weight:700;color:rgba(255,255,255,.92); }
    .content-subtitle { font-size:.7vw;font-weight:300;color:rgba(255,255,255,.28);margin-top:.2vh; }

    /* ── CARD GRID ── */
    .card-grid {
      display:grid;
      grid-template-columns:repeat(var(--cols, 3), 1fr);
      gap:1vw;
      flex:1;
      align-content:start;
    }

    .rule-card {
      background:rgba(255,255,255,.042);
      border:1px solid rgba(255,255,255,.07);
      border-radius:1vw;
      padding:1.6vh 1.2vw;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:.7vh;
      text-align:center;
      position:relative;
      overflow:hidden;
      animation:cardIn .4s var(--di,0s) cubic-bezier(.22,1,.36,1) both;
      transition:border-color .2s, background .2s;
      min-height:12vh;
    }
    @keyframes cardIn { from{opacity:0;transform:scale(.92) translateY(8px)} to{opacity:1;transform:none} }

    /* Carte interdiction (rouge) */
    .rule-card.forbidden {
      border-color:rgba(255,77,106,.2);
      background:rgba(255,77,106,.06);
    }
    .rule-card.forbidden::after {
      content:'';position:absolute;inset:0;
      background:radial-gradient(circle at 50% 0%, rgba(255,77,106,.08), transparent 70%);
      pointer-events:none;
    }

    /* Carte avertissement (jaune) */
    .rule-card.warning {
      border-color:rgba(255,217,61,.2);
      background:rgba(255,217,61,.05);
    }

    /* Carte info (neutre) */
    .rule-card.info {
      border-color:rgba(255,255,255,.1);
    }

    /* Carte OK (verte) */
    .rule-card.ok-card {
      border-color:rgba(107,203,119,.2);
      background:rgba(107,203,119,.05);
    }

    /* ── PICTOGRAMME ── */
    .pic-wrap {
      position:relative;
      display:flex;align-items:center;justify-content:center;
      width:4.5vw;height:4.5vw;
      border-radius:50%;
      background:var(--pic-bg, rgba(255,255,255,.07));
      flex-shrink:0;
    }
    .pic-emoji { font-size:2vw;line-height:1; }
    /* Croix rouge "interdit" */
    .pic-wrap.no::after {
      content:'';
      position:absolute;
      inset:-2px;
      border-radius:50%;
      border:2.5px solid #ff4d6a;
    }
    .pic-wrap.no::before {
      content:'';
      position:absolute;
      width:105%;height:2.5px;
      background:#ff4d6a;
      transform:rotate(45deg);
      border-radius:2px;
      box-shadow:0 0 8px rgba(255,77,106,.6);
    }

    /* Badge interdit top-right */
    .forbidden-badge {
      position:absolute;top:.6vh;right:.7vw;
      font-size:1.2vw;line-height:1;
      filter:drop-shadow(0 0 4px rgba(255,77,106,.6));
    }

    .card-label {
      font-size:.78vw;
      font-weight:700;
      color:rgba(255,255,255,.88);
      line-height:1.2;
      letter-spacing:.01em;
    }
    .card-sublabel {
      font-size:.62vw;
      font-weight:300;
      color:rgba(255,255,255,.38);
      line-height:1.3;
    }
    .card-label.red { color:#ff4d6a; }
    .card-label.yellow { color:#ffd93d; }
    .card-label.green { color:#6bcb77; }

    /* ── LARGE CARD (2 cols) ── */
    .rule-card.wide {
      grid-column: span 2;
      flex-direction:row;
      justify-content:flex-start;
      text-align:left;
      gap:1.2vw;
      padding:1.4vh 1.6vw;
    }
    .rule-card.wide .card-text { display:flex;flex-direction:column;gap:.3vh; }
    .rule-card.wide .card-label { font-size:.85vw; }
    .rule-card.wide .card-sublabel { font-size:.68vw; }

    /* ── INLINE CODE ── */
    .code-chip {
      display:inline-block;
      background:rgba(255,217,61,.14);
      border:1px solid rgba(255,217,61,.25);
      border-radius:.4vw;
      padding:.15vh .5vw;
      font-size:.82vw;
      font-weight:700;
      color:#ffd93d;
      letter-spacing:.05em;
      font-family:'Outfit', monospace;
    }

    /* ── FOOTER ── */
    .footer { display:flex;align-items:center;justify-content:space-between;padding-top:1.5vh;border-top:1px solid rgba(255,255,255,.05); }
    .footer-contact { display:flex;align-items:center;gap:.6vw; }
    .contact-label { font-size:.55vw;font-weight:300;color:rgba(255,255,255,.2);letter-spacing:.18em;text-transform:uppercase; }
    .contact-val { font-size:.9vw;font-weight:600;color:#25D366; }
    .clock { text-align:right; }
    .clock-time { font-size:1.9vw;font-weight:200;color:rgba(255,255,255,.32);font-variant-numeric:tabular-nums; }
    .clock-date { font-size:.58vw;font-weight:300;color:rgba(255,255,255,.14);letter-spacing:.14em;text-transform:capitalize; }
  </style>
</head>
<body>
<div class="bg"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="grain"></div>

<div class="page">
  <div class="header">
    <div class="header-left">
      <a class="back-btn" href="./">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Retour
      </a>
      <div class="header-sep"></div>
      <div class="logo">
        <span class="na1">À</span><span style="display:flex;gap:1px"><span class="nl1">L</span><span class="na2">A</span></span><span class="nf">F</span>
        <svg class="flower-svg" viewBox="0 0 40 40"><g transform="translate(20,20)">
          <ellipse fill="#fff" cx="0" cy="-10" rx="3.5" ry="8" transform="rotate(0)"/>
          <ellipse fill="#fff" cx="0" cy="-10" rx="3.5" ry="8" transform="rotate(45)"/>
          <ellipse fill="#fff" cx="0" cy="-10" rx="3.5" ry="8" transform="rotate(90)"/>

          <ellipse fill="#fff" cx="0" cy="-10" rx="3.5" ry="8" transform="rotate(270)"/>
          <ellipse fill="#fff" cx="0" cy="-10" rx="3.5" ry="8" transform="rotate(315)"/>
          <circle fill="#ffd93d" cx="0" cy="0" r="5"/>
        </g></svg>
        <span style="display:flex;gap:1px"><span class="nl2">L</span><span class="ni">I</span><span class="ne">E</span></span>
      </div>
    </div>
    <div class="header-title">Règles de la maison</div>
  </div>

  <div class="split">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-label">Catégories</div>

      <div class="cat-btn active" data-key="essential" tabindex="0" style="--c:#ff4d6a;--ibg:rgba(255,77,106,.14)" onclick="select('essential')">

        <span class="cat-btn-label">Règles essentielles</span>
        <span class="cat-btn-arrow">▶</span>
      </div>

      <div class="cat-btn" data-key="acces" tabindex="0" style="--c:#ffd93d;--ibg:rgba(255,217,61,.14)" onclick="select('acces')">
        <div class="cat-btn-icon">🔑</div>
        <span class="cat-btn-label">Accès & Codes</span>
        <span class="cat-btn-arrow">▶</span>
      </div>

      <div class="cat-btn" data-key="tv" tabindex="0" style="--c:#9b5de5;--ibg:rgba(155,93,229,.14)" onclick="select('tv')">
        <div class="cat-btn-icon">📺</div>
        <span class="cat-btn-label">TV & Son</span>
        <span class="cat-btn-arrow">▶</span>
      </div>

      <div class="cat-btn" data-key="cuisine" tabindex="0" style="--c:#6bcb77;--ibg:rgba(107,203,119,.14)" onclick="select('cuisine')">
        <div class="cat-btn-icon">🍳</div>
        <span class="cat-btn-label">Cuisine</span>
        <span class="cat-btn-arrow">▶</span>
      </div>

      <div class="cat-btn" data-key="lumieres" tabindex="0" style="--c:#ff8c42;--ibg:rgba(255,140,66,.14)" onclick="select('lumieres')">
        <div class="cat-btn-icon">💡</div>
        <span class="cat-btn-label">Lumières</span>
        <span class="cat-btn-arrow">▶</span>
      </div>

      <div class="cat-btn" data-key="depart" tabindex="0" style="--c:#4dd4d4;--ibg:rgba(77,212,212,.14)" onclick="select('depart')">
        <div class="cat-btn-icon">🌿</div>
        <span class="cat-btn-label">Plantes & Départ</span>
        <span class="cat-btn-arrow">▶</span>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-panel" id="contentPanel">
      <!-- rempli par JS -->
    </div>
  </div>

  <div class="footer">
    <div class="footer-contact">
      <svg width="1.9vw" height="1.9vw" viewBox="0 0 24 24" fill="#25D366">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      <div>
        <div class="contact-label">Lea · WhatsApp 24h/24</div>
        <div class="contact-val">06 20 20 20 36</div>
      </div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate"></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  essential: {

function renderCard(c, i) {
  const wideClass = c.wide ? 'wide' : '';
  const typeClass = c.type || 'info';
  const delay = `${i * 0.05}s`;
  const noClass = c.type === 'forbidden' ? 'no' : '';

  const badgeHtml = c.badge ? `<span class="forbidden-badge">${c.badge}</span>` : '';
  const labelColorClass = c.type === 'forbidden' ? 'red' : c.type === 'warning' ? 'yellow' : c.type === 'ok-card' ? 'green' : '';

  if (c.wide) {
    return `
      <div class="rule-card ${typeClass} wide" style="--di:${delay}">
        <div class="pic-wrap ${noClass}" style="--pic-bg:${c.picBg}">
          <span class="pic-emoji">${c.pic}</span>
        </div>
        <div class="card-text">
          <div class="card-label ${labelColorClass}">${c.label}</div>
          <div class="card-sublabel">${c.sub}</div>
        </div>
        ${badgeHtml}
      </div>`;
  }

  return `
    <div class="rule-card ${typeClass}" style="--di:${delay}">
      ${badgeHtml}
      <div class="pic-wrap ${noClass}" style="--pic-bg:${c.picBg}">
        <span class="pic-emoji">${c.pic}</span>
      </div>
      <div class="card-label ${labelColorClass}">${c.label}</div>
      <div class="card-sublabel">${c.sub}</div>
    </div>`;
}

function select(key) {
  const d = DATA[key];
  const panel = document.getElementById('contentPanel');

  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
  });

  panel.style.setProperty('--panel-accent', d.accent);

  panel.innerHTML = `
    <div class="content-head">
      <span class="content-head-emoji">${d.emoji}</span>
      <div>
        <div class="content-title">${d.title}</div>
      </div>
    </div>
    <div class="card-grid" style="--cols:${d.cols}">
      ${d.cards.map((c, i) => renderCard(c, i)).join('')}
    </div>`;
}

// Init
select('essential');

// Keyboard nav
document.addEventListener('keydown', e => {
  const btns = [...document.querySelectorAll('.cat-btn')];
  const active = document.querySelector('.cat-btn.active');
  const idx = btns.indexOf(active);
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    const next = btns[(idx + 1) % btns.length];
    next.click(); next.focus();
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    const prev = btns[(idx - 1 + btns.length) % btns.length];
    prev.click(); prev.focus();
  } else if (e.key === 'Enter') {
    if (document.activeElement && document.activeElement.classList.contains('cat-btn')) {
      document.activeElement.click();
    }
  } else if (e.key === 'Escape' || e.key === 'Backspace') {
    window.location.href = './';
  }
});

// Horloge
function tick() {
  const n = new Date();
  document.getElementById('clockTime').textContent = n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clockDate').textContent = n.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
tick(); setInterval(tick, 1000);
</script>
